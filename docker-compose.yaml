version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: file_storage_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: filestorage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - filestorage-network

  minio:
    image: minio/minio:latest
    container_name: minio-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: file_storage_mini
      MINIO_ROOT_PASSWORD: elxan123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - filestorage-network

volumes:
  pgdata:
  minio_data:

networks:
  filestorage-network:
    driver: bridge